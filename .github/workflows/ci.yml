name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: lint + test (no GPU)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev/report deps (CPU-only, no torch)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,report]"

      - name: ruff
        run: ruff check .

      - name: ruff format
        run: ruff format --check .

      - name: mypy
        run: mypy src

      - name: pytest
        env:
          # Tests do not require network or GPU. The model-metadata layer
          # uses a curated table for the public models referenced here.
          CANIFINETUNE_LOG_LEVEL: WARNING
        run: pytest -ra --cov=canifinetune --cov-report=term --cov-fail-under=70

      - name: CLI smoke
        run: |
          canifinetune --help
          canifinetune --version
          canifinetune estimate \
            --model Qwen/Qwen2.5-1.5B-Instruct \
            --method qlora --gpu-vram-gb 16 --seq-len 2048 \
            --micro-batch-size 1 --lora-rank 16 --json > /tmp/est.json
          python -c "import json; d=json.load(open('/tmp/est.json')); assert d['feasible'] in {'yes','marginal','no'}"

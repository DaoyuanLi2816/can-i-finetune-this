name: Release to PyPI

# Publishes to PyPI when a GitHub release is published.
# Uses PyPI trusted publishing (no token stored in the repository).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e ".[dev]"
      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(python -c 'import canifinetune; print(canifinetune.__version__)')"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$package_version" = "$tag_version" || {
            echo "release tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          }
      - name: Verify source
        run: |
          ruff check .
          ruff format --check .
          mypy src
          pytest -q
      - name: Build distributions
        run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

# Auto-generated by canifinetune.
# Edit values here; train.py reads them via --config.

model_id: "sshleifer/tiny-gpt2"
output_dir: "output"
dataset_path: "data/sample.jsonl"

method: "lora"

seq_len: 128
micro_batch_size: 1
gradient_accumulation_steps: 1

learning_rate: 0.0002
max_steps: 5
logging_steps: 1
save_steps: 100
seed: 42

gradient_checkpointing: false
attention_implementation: "eager"
use_liger_kernel: false

# Mixed precision
base_dtype: "fp32"

# Quantization (only used when method == qlora)
quantization: "bf16"

# LoRA
lora_rank: 8
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - c_attn
  - c_proj


# Optimizer (paged_adamw_8bit recommended for QLoRA)
optimizer: "adamw_torch"

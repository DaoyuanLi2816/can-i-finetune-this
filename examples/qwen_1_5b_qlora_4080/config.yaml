# Auto-generated by canifinetune.
# Edit values here; train.py reads them via --config.

model_id: "Qwen/Qwen2.5-1.5B-Instruct"
output_dir: "output"
dataset_path: "data/sample.jsonl"

method: "qlora"

seq_len: 1024
micro_batch_size: 1
gradient_accumulation_steps: 8

learning_rate: 0.0002
max_steps: 10
logging_steps: 1
save_steps: 100
seed: 42

gradient_checkpointing: true
attention_implementation: "sdpa"

# Mixed precision
base_dtype: "bf16"

# Quantization (only used when method == qlora)
quantization: "nf4_double_quant"

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj


# Optimizer (paged_adamw_8bit recommended for QLoRA)
optimizer: "paged_adamw_8bit"
